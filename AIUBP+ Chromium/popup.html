<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
  <title>AIUB Portal+</title>
</head>
<body>

  <div class="popup-card">

    <!-- Header -->
    <header class="header">
      <div class="logo-group">
        <div class="logo-box">
          <img id="logo-img" src="icons/black.png" alt="Logo">
        </div>
        <div class="title-group">
          <h1 class="title">AIUB Portal<span class="plus">+</span></h1>
          <p class="subtitle">made by SADI😘</p>
        </div>
      </div>

      <button id="theme-toggle" class="theme-btn" aria-label="Toggle theme" title="Toggle theme">
        <!-- Moon icon — shown in dark mode -->
        <svg id="moon-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
        <!-- Sun icon — shown in light mode -->
        <svg id="sun-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </button>
    </header>

    <div class="divider"></div>

    <!-- API Key Section -->
    <div class="field-group">
      <label class="field-label" for="apiKey">OCR.Space Key</label>
      <div id="input-wrapper" class="input-wrapper">
        <svg class="key-icon" width="15" height="15" viewBox="0 0 24 24" fill="none">
          <circle cx="8" cy="15" r="4" stroke="currentColor" stroke-width="2"/>
          <path d="M11.5 11.5L20 3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M18 5l2 2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M15 8l1 1" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <div class="icon-divider"></div>
        <input type="password" id="apiKey" class="api-input" placeholder="OCR API KEY">
        <button id="clear-btn" class="clear-btn" style="display:none;" aria-label="Clear">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <path d="M18 6L6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <a href="https://ocr.space/ocrapi/freekey" target="_blank" rel="noopener noreferrer" class="get-key-link">Free Api</a>
    </div>

    <!-- Save Button -->
    <button id="saveBtn" class="save-btn">Save Configuration</button>

    <div id="status" class="status-msg"></div>

    <div class="divider"></div>

    <!-- Footer -->
    <footer class="footer">
      <span class="version">v1.5.0</span>
      <a href="https://github.com/sakibmahmudsadi/AIUB_Portal_plus" target="_blank" rel="noopener noreferrer" class="github-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-6.225 0-1.38.48-2.52 1.26-3.405-.12-.315-.54-1.605.12-3.34 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.74.24 3.03.12 3.34.78.885 1.26 2.01 1.26 3.405 0 4.905-2.805 5.925-5.475 6.225.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
        </svg>
        <span>GitHub</span>
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="ext-icon">
          <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/>
          <polyline points="15 3 21 3 21 9"/>
          <line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
      </a>
    </footer>

  </div>

  <script src="popup.js"></script>
</body>
</html>
